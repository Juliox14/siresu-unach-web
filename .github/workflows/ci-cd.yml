name: CI/CD Pipeline SIRESU

on:
  push:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2.12'
        extensions: mbstring, dom, curl, libxml, mysql, sqlite, pdo_sqlite

    - name: Copiar Entorno de Pruebas
      run: cp .env.example .env

    - name: Instalar Dependencias de Composer
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generar Encryption Key
      run: php artisan key:generate

    - name: Ejecutar Pruebas Automatizadas
      run: php artisan test

  deploy:
    runs-on: self-hosted
    needs: laravel-tests

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    # 🟢 NUEVO PASO: Configurar Node.js e instalar/compilar el Front en la nube
    - name: Configurar Node.js y compilar Assets
      uses: actions/setup-node@v4
      with:
        node-version: '20' # O la versión que uses en tu laptop
    - name: Compilar Frontend (Vite)
      run: |
        npm install
        npm run build

    # Ejecutar tu script que moverá TODO (incluyendo la carpeta public/build) al servidor
    - name: Ejecutar Script de Despliegue Local
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: |
        cd ${{ github.workspace }}
        chmod +x deploy.sh
        ./deploy.sh