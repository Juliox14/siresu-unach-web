name: Laravel SIRESU CI/CD

on:
  push:
    branches: ["main"]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: siresu_test
          MYSQL_USER: siresu
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: siresu_test
      DB_USERNAME: siresu
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Copiar .env de pruebas
        run: cp .env.example .env

      - name: Instalar Dependencias de Composer
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generar Llave de Aplicación
        run: php artisan key:generate

      - name: Directorios de Permisos
        run: chmod -R 777 storage bootstrap/cache

      - name: Esperar MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent && break
            echo "Esperando MySQL..."
            sleep 2
          done

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar Pruebas
        run: php artisan test

  deploy:
    runs-on: self-hosted
    needs: laravel-tests

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js y compilar Assets
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compilar Frontend (Vite)
        run: |
          npm ci
          npm run build

      - name: Ejecutar Script de Despliegue Local
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          cd ${{ github.workspace }}
          chmod +x deploy.sh
          ./deploy.sh